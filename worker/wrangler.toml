name = "portfolio-contact-form"
main = "worker.js"
compatibility_date = "2024-11-01"

# KV namespace for the blog publish-bridge (/posts). Create it with:
#   wrangler kv namespace create POSTS_KV
# then paste the returned id below.
kv_namespaces = [
  { binding = "POSTS_KV", id = "ca0bdae0365c46dc9dd4968968b1ee67" }
]

# Secrets are NOT stored here — set them via the CLI (see README.md):
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put PUBLISH_SECRET
